<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modern Calculator Application">
    <title>Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="calculator-wrapper">
        <div class="calculator">
            <div class="calculator-header">
                <div class="calculator-title">Calculator</div>
                <div class="header-icons">
                    <button class="icon-btn" id="theme-toggle" aria-label="Theme toggle">🌙</button>
                </div>
            </div>
            
            <div class="display-container">
                <input type="text" id="display" class="display" value="0" readonly aria-label="Calculator display">
                <div class="display-shadow"></div>
            </div>

            <div class="buttons-grid">
                <button class="btn btn-function btn-clear" onclick="pressButton('C')" aria-label="Clear">
                    <span class="btn-text">C</span>
                </button>
                <button class="btn btn-function btn-backspace" onclick="pressButton('⌫')" aria-label="Backspace">
                    <span class="btn-text">⌫</span>
                </button>
                <button class="btn btn-operator" onclick="pressButton('÷')" aria-label="Divide">
                    <span class="btn-text">÷</span>
                </button>
                <button class="btn btn-operator" onclick="pressButton('×')" aria-label="Multiply">
                    <span class="btn-text">×</span>
                </button>

                <button class="btn btn-number" onclick="pressButton('7')">
                    <span class="btn-text">7</span>
                </button>
                <button class="btn btn-number" onclick="pressButton('8')">
                    <span class="btn-text">8</span>
                </button>
                <button class="btn btn-number" onclick="pressButton('9')">
                    <span class="btn-text">9</span>
                </button>
                <button class="btn btn-operator" onclick="pressButton('-')" aria-label="Subtract">
                    <span class="btn-text">−</span>
                </button>

                <button class="btn btn-number" onclick="pressButton('4')">
                    <span class="btn-text">4</span>
                </button>
                <button class="btn btn-number" onclick="pressButton('5')">
                    <span class="btn-text">5</span>
                </button>
                <button class="btn btn-number" onclick="pressButton('6')">
                    <span class="btn-text">6</span>
                </button>
                <button class="btn btn-operator" onclick="pressButton('+')" aria-label="Add">
                    <span class="btn-text">+</span>
                </button>

                <button class="btn btn-number" onclick="pressButton('1')">
                    <span class="btn-text">1</span>
                </button>
                <button class="btn btn-number" onclick="pressButton('2')">
                    <span class="btn-text">2</span>
                </button>
                <button class="btn btn-number" onclick="pressButton('3')">
                    <span class="btn-text">3</span>
                </button>
                <button class="btn btn-equals" onclick="pressButton('=')" aria-label="Equals">
                    <span class="btn-text">=</span>
                </button>

                <button class="btn btn-number btn-zero" onclick="pressButton('0')">
                    <span class="btn-text">0</span>
                </button>
                <button class="btn btn-number" onclick="pressButton('.')">
                    <span class="btn-text">.</span>
                </button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
